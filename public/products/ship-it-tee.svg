<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#0a0a0a"/>
  <!-- T-shirt silhouette -->
  <path d="M160 180 L160 160 L220 140 L260 155 L300 148 L340 155 L380 140 L440 160 L440 180 L480 170 L500 230 L450 250 L440 220 L440 460 Q440 480 420 480 L180 480 Q160 480 160 460 L160 220 L150 250 L100 230 L120 170 Z" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Vercel triangle accent -->
  <polygon points="300,250 340,320 260,320" fill="#0070F3" opacity="0.9"/>
  <!-- "Ship It" text -->
  <text x="300" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="3">Ship It</text>
  <!-- Subtle grid lines on shirt -->
  <line x1="200" y1="400" x2="400" y2="400" stroke="#222" stroke-width="0.5"/>
  <line x1="200" y1="420" x2="400" y2="420" stroke="#222" stroke-width="0.5"/>
  <!-- Label tag -->
  <rect x="285" y="162" width="30" height="18" rx="2" fill="#0a0a0a" stroke="#333" stroke-width="0.8"/>
  <text x="300" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#555">VERCEL</text>
</svg>