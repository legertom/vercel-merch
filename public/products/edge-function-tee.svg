<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#f5f5f5"/>
  <!-- T-shirt silhouette (white tee) -->
  <path d="M160 180 L160 160 L220 140 L260 155 L300 148 L340 155 L380 140 L440 160 L440 180 L480 170 L500 230 L450 250 L440 220 L440 460 Q440 480 420 480 L180 480 Q160 480 160 460 L160 220 L150 250 L100 230 L120 170 Z" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Subtle edge/globe graphic -->
  <circle cx="300" cy="280" r="50" fill="none" stroke="#0070F3" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="280" r="35" fill="none" stroke="#0070F3" stroke-width="1" opacity="0.2"/>
  <ellipse cx="300" cy="280" rx="50" ry="18" fill="none" stroke="#0070F3" stroke-width="1" opacity="0.25"/>
  <ellipse cx="300" cy="280" rx="18" ry="50" fill="none" stroke="#0070F3" stroke-width="1" opacity="0.25"/>
  <!-- Small dots around globe for "edge locations" -->
  <circle cx="260" cy="265" r="3" fill="#0070F3" opacity="0.7"/>
  <circle cx="340" cy="290" r="3" fill="#0070F3" opacity="0.7"/>
  <circle cx="310" cy="238" r="3" fill="#0070F3" opacity="0.7"/>
  <circle cx="285" cy="322" r="3" fill="#0070F3" opacity="0.7"/>
  <circle cx="345" cy="268" r="3" fill="#0070F3" opacity="0.5"/>
  <circle cx="258" cy="295" r="3" fill="#0070F3" opacity="0.5"/>
  <!-- "Running on the Edge" text -->
  <text x="300" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#0a0a0a" letter-spacing="1">Running on the</text>
  <text x="300" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#0070F3" letter-spacing="2">EDGE</text>
  <!-- Label tag -->
  <rect x="285" y="155" width="30" height="18" rx="2" fill="#f5f5f5" stroke="#ddd" stroke-width="0.8"/>
  <text x="300" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#999">VERCEL</text>
</svg>