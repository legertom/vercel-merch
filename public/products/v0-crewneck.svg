  <line x1="260" y1="490" x2="260" y2="508" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="280" y1="490" x2="280" y2="508" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="300" y1="490" x2="300" y2="508" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="320" y1="490" x2="320" y2="508" stroke="#3a3a3a" stroke-width="0.5"/>
  <line x1="340" y1="490" x2="340" y2="508" stroke="#3a3a3a" stroke-width="0.5"/>
