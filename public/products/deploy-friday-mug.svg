<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#0a0a0a"/>
  <!-- Mug body -->
  <rect x="150" y="180" width="260" height="280" rx="20" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Mug rim -->
  <ellipse cx="280" cy="180" rx="132" ry="18" fill="#222" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="280" cy="180" rx="118" ry="12" fill="#0a0a0a"/>
  <!-- Coffee inside -->
  <ellipse cx="280" cy="195" rx="110" ry="10" fill="#2a1a0a" opacity="0.6"/>
  <!-- Handle -->
  <path d="M410 240 Q480 240 480 330 Q480 420 410 420" fill="none" stroke="#333" stroke-width="8"/>
  <path d="M410 240 Q470 240 470 330 Q470 420 410 420" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Mug bottom -->
  <path d="M150 440 Q150 460 170 460 L390 460 Q410 460 410 440" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Steam lines -->
  <path d="M230 155 Q225 130 235 110" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M280 150 Q275 120 285 95" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M330 155 Q325 130 335 110" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- "I Deploy on Fridays" text -->
  <text x="280" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#666">I Deploy on</text>
  <text x="280" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="1">Fridays</text>
  <!-- Blue triangle accent -->
  <polygon points="280,370 295,395 265,395" fill="#0070F3" opacity="0.7"/>
  <!-- Subtle danger warning vibe -->
  <text x="280" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0070F3" opacity="0.5" letter-spacing="3">YOLO</text>
  <!-- Table surface reflection -->
  <rect x="130" y="480" width="300" height="40" rx="4" fill="#0a0a0a" opacity="0.5"/>
  <line x1="140" y1="480" x2="420" y2="480" stroke="#1a1a1a" stroke-width="1"/>
</svg>