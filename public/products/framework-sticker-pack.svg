<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" fill="#0a0a0a"/>
  <!-- Sticker sheet background -->
  <rect x="80" y="80" width="440" height="440" rx="16" fill="#111" stroke="#222" stroke-width="1"/>
  <!-- Grid of 6 stickers (2x3) -->
  <!-- Row 1 -->
  <!-- Sticker 1: Vercel triangle -->
  <g transform="translate(155, 170)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <polygon points="0,-30 35,25 -35,25" fill="#ffffff"/>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Vercel</text>
  </g>
  <!-- Sticker 2: Next.js N -->
  <g transform="translate(300, 170)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="-5" r="32" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ffffff">N</text>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Next.js</text>
  </g>
  <!-- Sticker 3: Turborepo -->
  <g transform="translate(445, 170)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="-8" r="22" fill="none" stroke="#0070F3" stroke-width="3"/>
    <circle cx="0" cy="-8" r="10" fill="#0070F3"/>
    <line x1="16" y1="8" x2="30" y2="22" stroke="#0070F3" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Turbo</text>
  </g>
  <!-- Row 2 -->
  <!-- Sticker 4: SWR -->
  <g transform="translate(155, 320)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="30" font-weight="800" fill="#0070F3">SWR</text>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">React Hooks</text>
  </g>
  <!-- Sticker 5: v0 -->
  <g transform="translate(300, 320)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="36" font-weight="300" fill="#ffffff">v0</text>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">AI</text>
  </g>
  <!-- Sticker 6: Edge -->
  <g transform="translate(445, 320)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <polygon points="0,-25 28,12 17,12 8,30 -8,-2 3,-2 -18,-25" fill="#0070F3" opacity="0.9"/>
    <text x="0" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#666">Edge</text>
  </g>
  <!-- Title -->
  <text x="300" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#444" letter-spacing="4">STICKER PACK</text>
</svg>